spring.application.name=${SPRING_APPLICATION_NAME:system-design-java-project1}

# Server Configuration
server.port=${SERVER_PORT:8080}
server.servlet.context-path=${SERVER_SERVLET_CONTEXT_PATH:/api}

# Redis Configuration
spring.redis.host=${SPRING_REDIS_HOST:localhost}
spring.redis.port=${SPRING_REDIS_PORT:6379}
spring.redis.password=${SPRING_REDIS_PASSWORD:}
spring.redis.database=${SPRING_REDIS_DATABASE:0}
spring.redis.timeout=${SPRING_REDIS_TIMEOUT:2000ms}
spring.redis.jedis.pool.max-active=${SPRING_REDIS_JEDIS_POOL_MAX_ACTIVE:8}
spring.redis.jedis.pool.max-idle=${SPRING_REDIS_JEDIS_POOL_MAX_IDLE:8}
spring.redis.jedis.pool.min-idle=${SPRING_REDIS_JEDIS_POOL_MIN_IDLE:0}

# Application Configuration
app.rate-limit.max-requests=${APP_RATE_LIMIT_MAX_REQUESTS:5}
app.rate-limit.window-minutes=${APP_RATE_LIMIT_WINDOW_MINUTES:1}
app.otp.expiry-minutes=${APP_OTP_EXPIRY_MINUTES:5}
app.otp.length=${APP_OTP_LENGTH:6}
