services:

  redis:
    image: redis:7.4-alpine
    container_name: rate-limit-redis
    restart: unless-stopped

    ports:
      - "6379:6379"

    volumes:
      - redis-data:/data

    command: redis-server --appendonly yes

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

    networks:
      - rate-limit-network

  app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: rate-limit-app
    restart: unless-stopped

    ports:
      - "8080:8080"

    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379

    depends_on:
      redis:
        condition: service_healthy

    networks:
      - rate-limit-network

networks:
  rate-limit-network:
    driver: bridge

volumes:
  redis-data: